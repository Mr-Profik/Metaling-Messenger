<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metaling Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-item { transition: all 0.3s ease; }
        .nav-active { color: #38bdf8; transform: translateY(-2px); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="p-4 glass sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center">
                <i class="fas fa-bolt text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-black tracking-tighter text-white">METALING</h1>
        </div>
        <div class="flex gap-5 text-slate-400">
            <i class="fas fa-search text-lg"></i>
            <i class="fas fa-user-circle text-lg"></i>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto pb-24">
        
        <!-- CHATS TAB -->
        <div id="chats" class="tab-content tab-active p-4 space-y-3">
            <div class="flex items-center gap-4 p-4 glass rounded-2xl">
                <div class="w-12 h-12 bg-gradient-to-tr from-blue-600 to-sky-400 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fab fa-telegram-plane text-xl"></i>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-sm">Telegram Messages</span>
                        <span class="text-[10px] text-slate-500">14:02</span>
                    </div>
                    <p class="text-xs text-slate-400 truncate">Проверьте новые уведомления из ТГ...</p>
                </div>
            </div>

            <div class="flex items-center gap-4 p-4 glass rounded-2xl border-l-4 border-purple-500">
                <div class="w-12 h-12 bg-gradient-to-tr from-purple-600 to-fuchsia-400 rounded-full flex items-center justify-center shadow-lg shadow-purple-500/20">
                    <i class="fas fa-brain text-xl"></i>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-sm text-purple-400">Metaling AI</span>
                        <span class="text-[10px] text-green-500">Active</span>
                    </div>
                    <p class="text-xs text-slate-400">Я проанализировал ваши последние чаты...</p>
                </div>
            </div>

            <div class="flex items-center gap-4 p-4 glass rounded-2xl">
                <div class="w-12 h-12 bg-slate-700 rounded-full flex items-center justify-center">
                    <i class="fas fa-users text-lg"></i>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-sm">Разработка Metaling</span>
                        <span class="text-[10px] text-slate-500">Вчера</span>
                    </div>
                    <p class="text-xs text-slate-400 font-medium text-sky-400">Вы: Заливаю на GitHub!</p>
                </div>
            </div>
        </div>

        <!-- MARKET TAB -->
        <div id="market" class="tab-content p-4">
            <h2 class="text-xl font-bold mb-6">Meta Market</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-4 rounded-2xl border border-white/5">
                    <div class="aspect-square bg-slate-800 rounded-xl mb-3 flex items-center justify-center">
                        <i class="fas fa-gem text-3xl text-sky-400"></i>
                    </div>
                    <h3 class="text-sm font-bold">Premium Status</h3>
                    <p class="text-xs text-sky-400 mt-1">4.99 LIME</p>
                </div>
                <div class="glass p-4 rounded-2xl border border-white/5">
                    <div class="aspect-square bg-slate-800 rounded-xl mb-3 flex items-center justify-center">
                        <i class="fas fa-robot text-3xl text-purple-400"></i>
                    </div>
                    <h3 class="text-sm font-bold">AI Pro Mode</h3>
                    <p class="text-xs text-purple-400 mt-1">9.99 LIME</p>
                </div>
            </div>
        </div>

    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 w-full glass border-t border-white/5 flex justify-around items-center p-4">
        <button onclick="showTab('chats', this)" class="nav-item nav-active flex flex-col items-center">
            <i class="fas fa-comments text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Чаты</span>
        </button>
        <button onclick="showTab('market', this)" class="nav-item text-slate-500 flex flex-col items-center">
            <i class="fas fa-shopping-bag text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Маркет</span>
        </button>
        <div class="relative -top-6">
            <button class="w-14 h-14 bg-sky-500 rounded-full flex items-center justify-center shadow-xl shadow-sky-500/40 border-4 border-[#0b0f19]">
                <i class="fas fa-plus text-white text-xl"></i>
            </button>
        </div>
        <button onclick="alert('Облако в разработке')" class="nav-item text-slate-500 flex flex-col items-center">
            <i class="fas fa-cloud text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Облако</span>
        </button>
        <button onclick="alert('Настройки профиля')" class="nav-item text-slate-500 flex flex-col items-center">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Опции</span>
        </button>
    </nav>

    <script>
        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(tabId).classList.add('tab-active');
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('nav-active');
                btn.classList.add('text-slate-500');
            });
            el.classList.add('nav-active');
            el.classList.remove('text-slate-500');
        }
    </script>
</body>
</html>
